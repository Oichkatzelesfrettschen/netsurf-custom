name: "Static Analysis"

on: [push]

jobs:
  codeql:
    name: codeql
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        language: ['cpp']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: apt-get install packages
      run: sudo apt-get update -qq &&
           sudo apt-get install --no-install-recommends -y
               bison
               build-essential
               ccache
               flex
               git
               gperf
               libcurl4-openssl-dev
               libgtk-3-dev
               libhtml-parser-perl
               libjpeg-dev
               libpng-dev
               librsvg2-dev
               libutf8proc-dev
               pkg-config

    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2.0
      with:
        key: ${{ github.job }}
        max-size: 128M

    - name: Bootstrap workspace
      env:
        REPO_BASE_URI: https://github.com/netsurf-browser
        TARGET_WORKSPACE: "${{ github.workspace }}/projects"
        NS_BRANCH: ${{ github.ref_name }}
      run: |
          make bootstrap

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    - name: Build NetSurf
      env:
        TARGET_WORKSPACE: "${{ github.workspace }}/projects"
      run: |
          make build-gtk

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install cppcheck
      run: sudo apt-get update -qq && sudo apt-get install --no-install-recommends -y cppcheck

    - name: Run cppcheck
      # Suppress duktape.c (large vendored file with intentional patterns)
      # and generated binding files which are auto-generated from WebIDL
      run: |
        make static-analysis
