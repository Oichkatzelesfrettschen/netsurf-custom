name: lacunae-gap-scan

# WHY: Run the gap analysis on every push to master so regressions
#      (new absent/stub gaps) are caught before merging.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  gap-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run lacunae scan
        run: python3 tools/lacunae.py scan

      - name: Check for regressions vs baseline
        run: |
          if [ -f test/lacunae-baseline.json ]; then
            python3 tools/lacunae.py diff
          else
            echo "No baseline found; skipping regression check."
          fi

      - name: Upload gap artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lacunae-gaps-${{ github.sha }}
          path: lacunae-gaps.json
          retention-days: 30
