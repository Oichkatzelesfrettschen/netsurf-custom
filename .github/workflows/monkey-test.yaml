name: "Monkey Test"

on: [pull_request]

jobs:
  test:
    name: '${{ matrix.test }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - short-internet

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: apt-get install packages
      run: sudo apt-get update -qq &&
           sudo apt-get install --no-install-recommends -y
               bison
               build-essential
               ccache
               check
               clang
               flex
               git
               gperf
               libcurl4-openssl-dev
               libgtk-3-dev
               libhtml-parser-perl
               libjpeg-dev
               libpng-dev
               librsvg2-dev
               libutf8proc-dev
               llvm
               pkg-config
               python3-pyasyncore
               wbritish # Needed for `/usr/share/dict/words`, used by test

    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2.0
      with:
        key: ${{ github.job }}
        max-size: 128M

    - name: Bootstrap workspace
      env:
        REPO_BASE_URI: https://github.com/netsurf-browser
        TARGET_WORKSPACE: "${{ github.workspace }}/projects"
        NS_BRANCH: ${{ github.ref_name }}
      run: |
          make bootstrap

    - name: Build NetSurf Monkey
      env:
        TARGET_WORKSPACE: "${{ github.workspace }}/projects"
      run: |
          make build-monkey

    - name: Run Monkey Test
      env:
        TARGET_WORKSPACE: "${{ github.workspace }}/projects"
      run: |
          make test-monkey-division MONKEY_DIVISION=${{ matrix.test }}
