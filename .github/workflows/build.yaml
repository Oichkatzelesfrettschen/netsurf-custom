name: "Linux Build"

on: [push]

jobs:
  # Native linux builds
  native:
    name: 'Native: ${{ matrix.os }}: ${{ matrix.compiler.vendor }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
        compiler:
          # The NetSurf build system can't find LLVM AR (it looks for it
          # in /usr/lib instead of /usr/bin:
          #     `make: /usr/lib/llvm-ar: No such file or directory`).
          # So we need to make it explicit for llvm.
          - { vendor: gnu,  CC: gcc }
          - { vendor: llvm, CC: clang, AR: llvm-ar }

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: apt-get install packages
      run: sudo apt-get update -qq &&
           sudo apt-get install --no-install-recommends -y
               bison
               build-essential
               ccache
               check
               clang
               flex
               git
               gperf
               libcurl4-openssl-dev
               libgtk-3-dev
               libhtml-parser-perl
               libjpeg-dev
               libpng-dev
               librsvg2-dev
               libutf8proc-dev
               llvm
               pkg-config
               wbritish # Needed for `/usr/share/dict/words`, used by test

    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2.0
      with:
        key: ${{ github.job }}-${{ matrix.os }}-${{ matrix.compiler.vendor }}
        max-size: 128M

    - name: Bootstrap workspace
      env:
        CC: ${{ matrix.compiler.CC }}
        CXX: ${{ matrix.compiler.CXX }}
        REPO_BASE_URI: https://github.com/netsurf-browser
        TARGET_WORKSPACE: "${{ github.workspace }}/projects" # Same as "$(pwd)/projects"
        NS_BRANCH: ${{ github.ref_name }}
      run: |
          make bootstrap

    - name: Verify native workflow
      # WHY SKIP_MALLOC_LIMIT_TESTS: malloc_fig.c overrides malloc() via
      # dlsym(RTLD_NEXT,"malloc"). Under Clang on Linux the interception
      # fails (malloc may be inlined or the dynamic interposition is absent),
      # causing hashmap and corestrings tests to see NSERROR_OK where they
      # expect NSERROR_NOMEM. Setting SKIP_MALLOC_LIMIT_TESTS=1 removes only
      # those two injection-dependent tests so the other 10 still run.
      env:
        CC: ${{ matrix.compiler.CC }}
        CXX: ${{ matrix.compiler.CXX }}
        TARGET_WORKSPACE: "${{ github.workspace }}/projects" # Same as "$(pwd)/projects"
        SKIP_MALLOC_LIMIT_TESTS: ${{ matrix.compiler.vendor == 'llvm' && '1' || '0' }}
      run: |
          make verify-native SKIP_MALLOC_LIMIT_TESTS=${SKIP_MALLOC_LIMIT_TESTS}

    - name: Capture monkey memcheck baseline
      if: matrix.os == 'ubuntu-24.04' && matrix.compiler.vendor == 'gnu'
      env:
        CC: ${{ matrix.compiler.CC }}
        TARGET_WORKSPACE: "${{ github.workspace }}/projects"
      run: |
          make profile-valgrind-monkey

    - name: Upload monkey baseline artifacts
      if: matrix.os == 'ubuntu-24.04' && matrix.compiler.vendor == 'gnu' && always()
      uses: actions/upload-artifact@v4
      with:
        name: monkey-baselines-${{ matrix.os }}-${{ matrix.compiler.vendor }}-${{ github.sha }}
        path: |
          build/profiles/monkey-benchmark.raw.json
          build/profiles/monkey-benchmark.json
          build/profiles/monkey-valgrind.xml
          build/profiles/monkey-valgrind.json
        retention-days: 30

  # Cross compile using toolchains built in the toolchains repo.
  cross:
    name: 'Cross: ${{ matrix.build.toolchain }}' # ATM toolchain unique across builds
    runs-on: ubuntu-24.04 # Matches toolchains workflow
    strategy:
      fail-fast: false
      matrix:
        build:
          - { toolchain: arm-riscos-gnueabi,   frontend: riscos,   pkg-file: netsurf.zip }
          - { toolchain: arm-unknown-riscos,   frontend: riscos,   pkg-file: netsurf.zip }
          - { toolchain: i686-w64-mingw32,     frontend: windows,  pkg-file: netsurf-installer.exe }
          - { toolchain: m5475-atari-mint,     frontend: atari,    pkg-file: nsv4e.zip }
          - { toolchain: m68k-atari-mint,      frontend: atari,    pkg-file: ns020.zip }
          - { toolchain: m68k-unknown-amigaos, frontend: amigaos3, pkg-file: NetSurf_Amiga/netsurf.lha }
          - { toolchain: ppc-amigaos,          frontend: amiga,    pkg-file: NetSurf_Amiga/netsurf.lha }
          - { toolchain: x86_64-w64-mingw32,   frontend: windows,  pkg-file: netsurf-installer.exe }

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: apt-get install packages
      run: sudo apt-get update -qq &&
           sudo apt-get install --no-install-recommends -y
               bison
               build-essential
               ccache
               check
               clang
               flex
               git
               gperf
               jlha-utils
               libcurl4-openssl-dev
               libgtk-3-dev
               libhtml-parser-perl
               libjpeg-dev
               libpng-dev
               librsvg2-dev
               llvm
               nsis
               pkg-config

    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2.0
      with:
        key: ${{ github.job }}-${{ matrix.build.toolchain }}
        max-size: 128M

    # look for toolchain for this branch name first, then default to master
    - name: Download toolchain
      run: |
        set -e
        
        TOOLCHAIN_NAME="${{ matrix.build.toolchain }}"
        BRANCH_NAME="${{ github.ref_name }}"
        
        # Function to try downloading toolchain from a specific tag
        download_toolchain() {
          local ref="$1"
          local download_url="https://github.com/netsurf-browser/toolchains/releases/download/${ref}/${TOOLCHAIN_NAME}.tar.gz"
          
          echo "Trying to download toolchain from ref: $ref"
          echo "URL: $download_url"
          
          if curl -f -L -o "${TOOLCHAIN_NAME}.tar.gz" "$download_url"; then
            echo "Got toolchain with ref: $ref"
            return 0
          else
            echo "Failed to download toolchain with ref: $ref"
            return 1
          fi
        }
        
        # Try branch-specific toolchain first
        safe_branch=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')
        branch_tag="gh-${safe_branch}-unstable"
        
        if download_toolchain "$branch_tag"; then
          echo "Downloaded branch-specific toolchain"
        elif download_toolchain "gh-master-unstable"; then
          echo "Downloaded fallback master toolchain"
        else
          echo "Failed to download any toolchain variant"
          exit 1
        fi

    - name: Install toolchain
      run: |
        echo "Installing toolchain: ${{ matrix.build.toolchain }}"
        sudo tar -xzf "${{ matrix.build.toolchain }}.tar.gz" -C /
        rm "${{ matrix.build.toolchain }}.tar.gz"
        echo "Toolchain testament:"
        cat /opt/netsurf/${{ matrix.build.toolchain }}/BUILD_INFO.txt

    - name: Bootstrap workspace
      env:
        HOST: "${{ matrix.build.toolchain }}"
        REPO_BASE_URI: https://github.com/netsurf-browser
        TARGET_WORKSPACE: "${{ github.workspace }}/projects" # Same as "$(pwd)/projects"
        NS_BRANCH: ${{ github.ref_name }}
        Q:
      run: |
        make bootstrap TARGET=${{ matrix.build.frontend }} Q=

    - name: Build NetSurf
      env:
        HOST: "${{ matrix.build.toolchain }}"
        TARGET_WORKSPACE: "${{ github.workspace }}/projects" # Same as "$(pwd)/projects"
      run: |
        make build-native TARGET=${{ matrix.build.frontend }} Q=

    - name: Make package
      env:
        HOST: "${{ matrix.build.toolchain }}"
        TARGET_WORKSPACE: "${{ github.workspace }}/projects" # Same as "$(pwd)/projects"
      run: |
        make package-native TARGET=${{ matrix.build.frontend }} Q=

    # Can't avoid `upload-artifact` zipping the package
    # https://github.com/actions/upload-artifact/issues/426
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.build.toolchain }}-${{ matrix.build.frontend }}
        path: ${{ matrix.build.pkg-file }}
        compression-level: 0 # Avoid pointless recompression

  # Arch Linux native build
  arch:
    name: 'Arch Linux: GTK3'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install system packages
      run: |
        pacman -Syu --noconfirm --needed \
          base-devel pkgconf git gperf curl expat \
          libpng libjpeg-turbo libutf8proc openssl flex bison \
          perl-html-parser ccache check gtk3 librsvg

    - name: Bootstrap workspace
      env:
        REPO_BASE_URI: https://github.com/netsurf-browser
        TARGET_WORKSPACE: "${{ github.workspace }}/projects"
        TARGET_TOOLKIT: gtk3
        NS_BRANCH: ${{ github.ref_name }}
      run: |
        make bootstrap

    - name: Build NetSurf GTK3
      env:
        TARGET_WORKSPACE: "${{ github.workspace }}/projects"
        TARGET_TOOLKIT: gtk3
      run: |
        make build-gtk

    - name: Unit Tests
      env:
        TARGET_WORKSPACE: "${{ github.workspace }}/projects"
        TARGET_TOOLKIT: gtk3
      run: |
        make test-unit

  # ASan + UBSan unit tests (GCC only).
  # WHY: The malloc injection tests rely on dlsym(RTLD_NEXT,"malloc") which
  #      works reliably only with GCC on Linux. Running sanitize under GCC
  #      catches heap errors and UB in the same test path. Clang is excluded
  #      because SKIP_MALLOC_LIMIT_TESTS=1 would be required there, removing
  #      the very tests most likely to expose memory errors.
  sanitize:
    name: 'ASan+UBSan unit tests (GCC, ubuntu-24.04)'
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: apt-get install packages
      run: sudo apt-get update -qq &&
           sudo apt-get install --no-install-recommends -y
               bison
               build-essential
               check
               flex
               git
               gperf
               libcurl4-openssl-dev
               libgtk-3-dev
               libhtml-parser-perl
               libjpeg-dev
               libpng-dev
               librsvg2-dev
               libutf8proc-dev
               pkg-config
               wbritish

    - name: Bootstrap workspace
      env:
        REPO_BASE_URI: https://github.com/netsurf-browser
        TARGET_WORKSPACE: "${{ github.workspace }}/projects"
        NS_BRANCH: ${{ github.ref_name }}
      run: |
          make bootstrap

    - name: Sanitize unit tests
      env:
        TARGET_WORKSPACE: "${{ github.workspace }}/projects"
      run: |
          make sanitize-unit
