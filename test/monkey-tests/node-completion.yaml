title: Node.isConnected/getRootNode/isSameNode and DocumentFragment
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
      var f=0;
      function ok(n,e){try{if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}catch(x){console.log("ERROR: "+n+": "+x);f++;}}
      var div=document.createElement("div");
      ok("detached isConnected=false", div.isConnected===false);
      document.body.appendChild(div);
      ok("attached isConnected=true", div.isConnected===true);
      ok("getRootNode is function", typeof div.getRootNode==="function");
      var root=div.getRootNode();
      ok("getRootNode returns document", root===document);
      ok("isSameNode is function", typeof div.isSameNode==="function");
      ok("isSameNode(self)=true", div.isSameNode(div)===true);
      var other=document.createElement("span");
      ok("isSameNode(other)=false", div.isSameNode(other)===false);
      var frag=document.createDocumentFragment();
      ok("fragment created", frag!==null);
      ok("fragment nodeType=11", frag.nodeType===11);
      var child=document.createElement("p");
      frag.appendChild(child);
      ok("fragment childElementCount", frag.childElementCount===1);
      ok("fragment firstElementChild", frag.firstElementChild===child);
      ok("fragment lastElementChild", frag.lastElementChild===child);
      console.log(f===0?"ALL PASS":"FAILURES: "+f);
      console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
