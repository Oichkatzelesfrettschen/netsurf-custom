title: Smoke test for performance.now() binding
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
    var f=0;
    function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
    var p=window.performance;
    if(typeof p==="undefined"){console.log("SKIP: performance not available on about:blank");console.log("DONE");return;}
    ok("performance is object", typeof p==="object"&&p!==null);
    var t=p.now();
    ok("now() returns number", typeof t==="number"&&!isNaN(t));
    ok("now() >= 0", t>=0);
    var t2=p.now();
    ok("monotonic", t2>=t);
    var origin=p.timeOrigin;
    ok("timeOrigin is non-negative number", typeof origin==="number"&&origin>=0);
    console.log(f===0?"ALL PASS":"FAILURES: "+f);
    console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
