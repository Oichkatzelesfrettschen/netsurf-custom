title: console.assert/count/countReset/table methods
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
      var f=0;
      function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
      try{console.assert(true,"should not log");ok("assert(true) no throw",true);}catch(e){ok("assert(true)",false);}
      try{console.assert(false,"assertion msg");ok("assert(false) no throw",true);}catch(e){ok("assert(false)",false);}
      try{console.count("myLabel");console.count("myLabel");ok("count no throw",true);}catch(e){ok("count",false);}
      try{console.countReset("myLabel");ok("countReset no throw",true);}catch(e){ok("countReset",false);}
      try{console.table([1,2,3]);ok("table no throw",true);}catch(e){ok("table",false);}
      console.log(f===0?"ALL PASS":"FAILURES: "+f);
      console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
