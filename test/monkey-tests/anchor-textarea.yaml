title: Smoke test for HTMLAnchorElement and HTMLTextAreaElement properties
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
    var f=0;
    function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
    var link=document.createElement("a");
    link.href="https://example.com/";
    link.target="_blank";
    link.rel="noopener";
    link.textContent="Example";
    document.body.appendChild(link);
    ok("a-href", typeof link.href==="string"&&link.href.indexOf("example.com")>=0);
    ok("a-target", link.target==="_blank");
    ok("a-rel", link.rel==="noopener");
    ok("a-text", link.text==="Example"||link.textContent==="Example");
    var ta=document.createElement("textarea");
    ta.name="comments";
    ta.rows=5;
    ta.value="Initial text";
    document.body.appendChild(ta);
    ok("ta-name", ta.name==="comments");
    ok("ta-value", typeof ta.value==="string"&&ta.value.indexOf("Initial")>=0);
    ok("ta-type", ta.type==="textarea");
    ok("ta-rows", ta.rows===5||ta.rows==="5");
    console.log(f===0?"ALL PASS":"FAILURES: "+f);
    console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
