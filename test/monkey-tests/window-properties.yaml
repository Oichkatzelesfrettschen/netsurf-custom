title: window.self/top/parent/closed/innerWidth/innerHeight properties
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
      var f=0;
      function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
      ok("self===window", window.self===window);
      ok("top===window", window.top===window);
      ok("parent===window", window.parent===window);
      ok("closed===false", window.closed===false);
      ok("innerWidth is number", typeof window.innerWidth==="number");
      ok("innerHeight is number", typeof window.innerHeight==="number");
      console.log(f===0?"ALL PASS":"FAILURES: "+f);
      console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
