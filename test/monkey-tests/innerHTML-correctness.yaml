title: innerHTML getter/setter correctness (void elements, round-trip, attribute escaping)
group: basic
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
    var f=0;
    function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
    var div=document.createElement("div");
    document.body.appendChild(div);
    div.innerHTML="<br>";
    ok("br no closing tag", div.innerHTML==="<br>");
    div.innerHTML='<img src="x">';
    ok("img no closing tag", !div.innerHTML.match(/<\/img>/));
    div.innerHTML="<b>hello</b>";
    ok("b round-trip", div.innerHTML==="<b>hello</b>");
    div.innerHTML="<p><span>text</span></p>";
    ok("nested round-trip", div.innerHTML==="<p><span>text</span></p>");
    div.innerHTML="";
    var span=document.createElement("span");
    span.setAttribute("title",'a"b');
    div.appendChild(span);
    ok("attr double-quote escaped", div.innerHTML.indexOf('a&quot;b')>=0||div.innerHTML.indexOf("a\"b")<0);
    var span2=document.createElement("span");
    span2.setAttribute("title","a<b");
    div.innerHTML="";
    div.appendChild(span2);
    ok("attr less-than escaped", div.innerHTML.indexOf("a<b")<0||div.innerHTML.indexOf("a&lt;b")>=0);
    div.innerHTML="<p>a&amp;b</p>";
    ok("text ampersand round-trip", div.innerHTML==="<p>a&amp;b</p>");
    console.log(f===0?"ALL PASS":"FAILURES: "+f);
    console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
