title: localStorage/sessionStorage API (setItem/getItem/removeItem/clear/key/length)
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
      var f=0;
      function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
      ok("localStorage exists", typeof localStorage==="object");
      ok("sessionStorage exists", typeof sessionStorage==="object");
      try{
        localStorage.clear();
        ok("localStorage.length===0", localStorage.length===0);
        localStorage.setItem("key1","val1");
        ok("setItem/getItem", localStorage.getItem("key1")==="val1");
        ok("length after set", localStorage.length===1);
        localStorage.setItem("key2","val2");
        ok("length after 2nd set", localStorage.length===2);
        ok("key(0) is string", typeof localStorage.key(0)==="string");
        ok("key(99) is null", localStorage.key(99)===null);
        localStorage.removeItem("key1");
        ok("removeItem", localStorage.getItem("key1")===null);
        ok("length after remove", localStorage.length===1);
        localStorage.clear();
        ok("clear", localStorage.length===0);
      }catch(e){console.log("FAIL: localStorage: "+e);f++;}
      try{
        sessionStorage.clear();
        sessionStorage.setItem("sk","sv");
        ok("sessionStorage setItem/getItem", sessionStorage.getItem("sk")==="sv");
        sessionStorage.clear();
        ok("sessionStorage clear", sessionStorage.length===0);
      }catch(e){console.log("FAIL: sessionStorage: "+e);f++;}
      console.log(f===0?"ALL PASS":"FAILURES: "+f);
      console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
