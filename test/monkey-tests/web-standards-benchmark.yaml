title: Web Standards Compliance Benchmark
group: benchmark
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
    window._B={p:0,f:0,s:0,cats:{},res:[]};
    window.T=function(cat,n,e){
    var B=window._B;if(!B.cats[cat])B.cats[cat]={p:0,f:0,s:0};
    try{if(e){B.p++;B.cats[cat].p++;console.log("PASS ["+cat+"] "+n);}
    else{B.f++;B.cats[cat].f++;console.log("FAIL ["+cat+"] "+n);B.res.push("["+cat+"] "+n);}}
    catch(x){B.s++;B.cats[cat].s++;console.log("SKIP ["+cat+"] "+n+": "+x);}};
    window.S=function(cat,n){var B=window._B;B.s++;if(!B.cats[cat])B.cats[cat]={p:0,f:0,s:0};B.cats[cat].s++;console.log("SKIP ["+cat+"] "+n);};
    window.R=function(done,fn){try{fn();}catch(x){console.log("SKIP [Error] Block crashed: "+x);}console.log(done);};
    console.log("HARNESS READY");
    })()
- action: wait-log
  window: win1
  substring: HARNESS READY
- action: js-exec
  window: win1
  cmd: >-
    R("NODE DONE",function(){
    var div=document.createElement("div");
    T("Node","createElement",div!==null&&div.nodeType===1);
    T("Node","ELEMENT_NODE",Node.ELEMENT_NODE===1);
    T("Node","TEXT_NODE",Node.TEXT_NODE===3);
    T("Node","COMMENT_NODE",Node.COMMENT_NODE===8);
    T("Node","DOCUMENT_NODE",Node.DOCUMENT_NODE===9);
    T("Node","DOCUMENT_FRAGMENT_NODE",Node.DOCUMENT_FRAGMENT_NODE===11);
    T("Node","nodeName",div.nodeName==="DIV");
    T("Node","ownerDocument",div.ownerDocument===document);
    T("Node","parentNode null",div.parentNode===null);
    T("Node","isConnected false",div.isConnected===false);
    document.body.appendChild(div);
    T("Node","isConnected true",div.isConnected===true);
    T("Node","parentNode",div.parentNode===document.body);
    T("Node","parentElement",div.parentElement===document.body);
    T("Node","getRootNode",div.getRootNode()===document);
    T("Node","isSameNode self",div.isSameNode(div)===true);
    T("Node","isSameNode other",div.isSameNode(document.createElement("span"))===false);
    T("Node","hasChildNodes false",div.hasChildNodes()===false);
    var sp=document.createElement("span");div.appendChild(sp);
    T("Node","hasChildNodes true",div.hasChildNodes()===true);
    T("Node","firstChild",div.firstChild===sp);
    T("Node","lastChild",div.lastChild===sp);
    T("Node","childNodes.length",div.childNodes.length===1);
    var txt=document.createTextNode("hello");
    T("Node","createTextNode",txt.nodeType===3);
    T("Node","textContent",txt.textContent==="hello");
    div.appendChild(txt);
    T("Node","previousSibling",txt.previousSibling===sp);
    T("Node","nextSibling",sp.nextSibling===txt);
    try{T("Node","cloneNode shallow",div.cloneNode(false).childNodes.length===0);}catch(e){S("Node","cloneNode shallow");}
    try{T("Node","cloneNode deep",div.cloneNode(true).childNodes.length===2);}catch(e){S("Node","cloneNode deep");}
    T("Node","contains self",div.contains(div)===true);
    T("Node","contains child",div.contains(sp)===true);
    T("Node","contains unrelated",div.contains(document.body)===false);
    T("Node","removeChild",div.removeChild(txt)===txt);
    T("Node","normalize fn",typeof div.normalize==="function");
    T("Node","compareDocumentPosition fn",typeof div.compareDocumentPosition==="function");
    T("Node","baseURI",typeof div.baseURI==="string");
    document.body.removeChild(div);
    })
