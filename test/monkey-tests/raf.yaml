title: Smoke test for requestAnimationFrame / cancelAnimationFrame
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){ if (typeof window.requestAnimationFrame === 'function') { console.log('PASS: rAF-exists'); } else { console.log('FAIL: rAF-exists=' + typeof window.requestAnimationFrame); } if (typeof window.cancelAnimationFrame === 'function') { console.log('PASS: cAF-exists'); } else { console.log('FAIL: cAF-exists=' + typeof window.cancelAnimationFrame); } var handle = requestAnimationFrame(function(ts) { if (typeof ts === 'number' && ts > 0) { console.log('PASS: rAF-timestamp'); } else { console.log('FAIL: rAF-timestamp=' + ts); } }); if (typeof handle === 'number' && handle > 0) { console.log('PASS: rAF-handle'); } else { console.log('FAIL: rAF-handle=' + handle); } var h2 = requestAnimationFrame(function() { console.log('FAIL: cancelled-rAF-fired'); }); cancelAnimationFrame(h2); console.log('PASS: cAF-no-throw'); console.log("DONE"); })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
