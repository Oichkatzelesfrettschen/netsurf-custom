# Smoke test for crypto.getRandomValues()
# WHY: Used by UUID generators and security libraries.

window: inline
content: |
  <html><head><title>crypto test</title></head>
  <body>
  <script>
    var results = [];

    // window.crypto exists
    if (typeof window.crypto === 'object' && window.crypto !== null) {
      results.push('PASS: crypto-exists');
    } else {
      results.push('FAIL: crypto-exists=' + typeof window.crypto);
    }

    // getRandomValues exists
    if (typeof window.crypto.getRandomValues === 'function') {
      results.push('PASS: grv-exists');
    } else {
      results.push('FAIL: grv-exists=' + typeof window.crypto.getRandomValues);
    }

    // getRandomValues fills a Uint8Array
    var arr = new Uint8Array(16);
    var result = window.crypto.getRandomValues(arr);

    // Returns the same array
    if (result === arr) {
      results.push('PASS: grv-returns-same');
    } else {
      results.push('FAIL: grv-returns-same');
    }

    // Not all zeros (extremely unlikely for 16 random bytes)
    var allZero = true;
    for (var i = 0; i < arr.length; i++) {
      if (arr[i] !== 0) { allZero = false; break; }
    }
    if (!allZero) {
      results.push('PASS: grv-nonzero');
    } else {
      results.push('FAIL: grv-all-zeros');
    }

    // Works with Uint32Array too
    var arr32 = new Uint32Array(4);
    window.crypto.getRandomValues(arr32);
    var allZero32 = true;
    for (var j = 0; j < arr32.length; j++) {
      if (arr32[j] !== 0) { allZero32 = false; break; }
    }
    if (!allZero32) {
      results.push('PASS: grv-uint32');
    } else {
      results.push('FAIL: grv-uint32-zeros');
    }

    document.title = results.join('; ');
  </script></body></html>

checks:
  - type: title-contains
    value: "PASS: crypto-exists"
  - type: title-contains
    value: "PASS: grv-nonzero"
  - type: title-not-contains
    value: "FAIL"
