title: Smoke test for crypto.getRandomValues()
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
    var f=0;
    function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
    var c=window.crypto;
    if(typeof c==="undefined"){console.log("SKIP: crypto not available on about:blank");console.log("DONE");return;}
    ok("crypto exists", typeof c==="object"&&c!==null);
    ok("getRandomValues exists", typeof c.getRandomValues==="function");
    try{
    var arr=new Uint8Array(16);
    var result=c.getRandomValues(arr);
    ok("returns same array", result===arr);
    var allZero=true;
    for(var i=0;i<arr.length;i++){if(arr[i]!==0){allZero=false;break;}}
    ok("not all zeros", !allZero);
    }catch(e){console.log("FAIL: getRandomValues: "+e);f++;}
    console.log(f===0?"ALL PASS":"FAILURES: "+f);
    console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
