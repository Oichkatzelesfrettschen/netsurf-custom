title: HTMLFormElement/ButtonElement/AnchorElement R10 properties
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
      var f=0;
      function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
      var form=document.createElement("form");
      document.body.appendChild(form);
      ok("form.autocomplete is string", typeof form.autocomplete==="string");
      ok("form.noValidate is bool", typeof form.noValidate==="boolean");
      ok("form.checkValidity", form.checkValidity()===true);
      ok("form.reportValidity", form.reportValidity()===true);
      ok("form.elements exists", form.elements!==undefined);
      var btn=document.createElement("button");
      btn.type="submit";
      form.appendChild(btn);
      ok("btn.type", btn.type==="submit");
      ok("btn.form", btn.form===form);
      ok("btn.formAction is string", typeof btn.formAction==="string");
      ok("btn.formEnctype is string", typeof btn.formEnctype==="string");
      ok("btn.formMethod is string", typeof btn.formMethod==="string");
      ok("btn.formNoValidate is bool", typeof btn.formNoValidate==="boolean");
      ok("btn.formTarget is string", typeof btn.formTarget==="string");
      ok("btn.willValidate is bool", typeof btn.willValidate==="boolean");
      ok("btn.validationMessage is string", typeof btn.validationMessage==="string");
      ok("btn.checkValidity", btn.checkValidity()===true);
      var a=document.createElement("a");
      a.href="https://example.com/path?q=1";
      document.body.appendChild(a);
      ok("a.download is string", typeof a.download==="string");
      ok("a.ping is string", typeof a.ping==="string");
      ok("a.referrerPolicy is string", typeof a.referrerPolicy==="string");
      ok("a.origin is string", typeof a.origin==="string");
      ok("a.text is string", typeof a.text==="string");
      a.text="Click me";
      ok("a.text setter", a.text==="Click me"||a.textContent==="Click me");
      console.log(f===0?"ALL PASS":"FAILURES: "+f);
      console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
