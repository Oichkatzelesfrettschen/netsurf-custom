title: Smoke test for HTMLImageElement.src/alt/width/height
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
    var f=0;
    function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
    var img=document.createElement("img");
    img.alt="Test Image";
    img.width=32;
    img.height=32;
    img.name="icon";
    document.body.appendChild(img);
    ok("img-alt", img.alt==="Test Image");
    ok("img-src is string", typeof img.src==="string");
    ok("img-width", img.width===32||img.width==="32");
    ok("img-height", img.height===32||img.height==="32");
    ok("img-name", img.name==="icon");
    img.alt="Changed";
    ok("img-alt-setter", img.alt==="Changed");
    console.log(f===0?"ALL PASS":"FAILURES: "+f);
    console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
