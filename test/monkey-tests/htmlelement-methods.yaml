title: Smoke test for HTMLElement.dir/lang/title + innerText + click/focus/blur
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
    var f=0;
    function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
    var d1=document.createElement("div");
    d1.dir="ltr";
    d1.lang="en";
    d1.title="test div";
    d1.textContent="Hello World";
    document.body.appendChild(d1);
    ok("dir=ltr", d1.dir==="ltr");
    d1.dir="rtl";
    ok("dir-setter", d1.dir==="rtl");
    ok("lang=en", d1.lang==="en");
    d1.lang="fr";
    ok("lang-setter", d1.lang==="fr");
    ok("title=test div", d1.title==="test div");
    d1.title="new title";
    ok("title-setter", d1.title==="new title");
    var txt=d1.innerText;
    ok("innerText", typeof txt==="string"&&txt.indexOf("Hello")>=0);
    try{var btn=document.createElement("button");document.body.appendChild(btn);btn.click();ok("click-no-throw",true);}catch(e){ok("click",false);}
    try{var inp=document.createElement("input");document.body.appendChild(inp);inp.focus();inp.blur();ok("focus-blur",true);}catch(e){ok("focus-blur",false);}
    console.log(f===0?"ALL PASS":"FAILURES: "+f);
    console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
