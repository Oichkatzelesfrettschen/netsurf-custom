title: Smoke test for querySelector / querySelectorAll
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){ var main = document.querySelector('#main'); if (main && main.id === 'main') { console.log('PASS: qs-id'); } else { console.log('FAIL: qs-id=' + (main ? main.id : 'null')); } var intro = document.querySelector('.intro'); if (intro && intro.textContent === 'Hello') { console.log('PASS: qs-class'); } else { console.log('FAIL: qs-class=' + (intro ? intro.textContent : 'null')); } var span = document.querySelector('span'); if (span && span.textContent === 'Label') { console.log('PASS: qs-tag'); } else { console.log('FAIL: qs-tag=' + (span ? span.textContent : 'null')); } var label = document.querySelector('[data-role]'); if (label && label.textContent === 'Label') { console.log('PASS: qs-attr'); } else { console.log('FAIL: qs-attr=' + (label ? label.textContent : 'null')); } var labelExact = document.querySelector('[data-role="label"]'); if (labelExact && labelExact.textContent === 'Label') { console.log('PASS: qs-attr-val'); } else { console.log('FAIL: qs-attr-val'); } var pIntro = document.querySelector('p.intro'); if (pIntro && pIntro.textContent === 'Hello') { console.log('PASS: qs-compound'); } else { console.log('FAIL: qs-compound'); } var allP = document.querySelectorAll('p'); if (allP && allP.length === 2) { console.log('PASS: qsa-count=2'); } else { console.log('FAIL: qsa-count=' + (allP ? allP.length : 'null')); } var none = document.querySelector('.nonexistent'); if (none === null) { console.log('PASS: qs-null'); } else { console.log('FAIL: qs-null=' + none); } var nested = document.getElementById('main'); if (nested) { var links = nested.querySelectorAll('a'); if (links && links.length === 1) { console.log('PASS: elem-qsa'); } else { console.log('FAIL: elem-qsa=' + (links ? links.length : 'null')); } } else { console.log('FAIL: elem-qsa-no-main'); } console.log("DONE"); })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
