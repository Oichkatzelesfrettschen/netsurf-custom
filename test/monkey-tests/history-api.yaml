title: History API smoke test (pushState, replaceState, back, forward, go, length)
group: basic
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
# WHY: Inject history API tests inline to avoid file:// path portability issues.
#      Tests check that the API exists, does not throw on valid calls, and that
#      the spec-required invariants hold (length, push vs replace semantics).
#      Edge cases validate robustness: go() with out-of-range deltas must not
#      crash, and go(0) must trigger a reload without throwing.
- action: js-exec
  window: win1
  cmd: >-
    (function(){
      var f=0;
      function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}

      // --- Basic API existence ---
      ok("history exists", typeof window.history==="object");
      ok("history.length is number", typeof history.length==="number");

      // --- length === 1 on fresh page ---
      ok("history.length >= 1 on fresh page", history.length>=1);

      // --- pushState increases length ---
      try{
        var b=history.length;
        history.pushState({},"","?p=1");
        ok("pushState increases length", history.length===b+1);
      }catch(e){console.log("FAIL: pushState: "+e);f++;}

      // --- replaceState does NOT increase length ---
      try{
        var b=history.length;
        history.replaceState({},"","?r=1");
        ok("replaceState keeps length", history.length===b);
      }catch(e){console.log("FAIL: replaceState: "+e);f++;}

      // --- back/forward no throw ---
      try{history.back();ok("back() no throw",true);}catch(e){console.log("FAIL: back(): "+e);f++;}
      try{history.forward();ok("forward() no throw",true);}catch(e){console.log("FAIL: forward(): "+e);f++;}

      // --- go(0) triggers reload (no throw) ---
      try{history.go(0);ok("go(0) no throw",true);}catch(e){console.log("FAIL: go(0): "+e);f++;}

      // --- go(+large) on small history does not crash ---
      try{history.go(100);ok("go(+100) no crash",true);}catch(e){console.log("FAIL: go(+100): "+e);f++;}

      // --- go(-large) on small history does not crash ---
      try{history.go(-100);ok("go(-100) no crash",true);}catch(e){console.log("FAIL: go(-100): "+e);f++;}

      // --- go(1) no throw ---
      try{history.go(1);ok("go() positive no throw",true);}catch(e){console.log("FAIL: go(): "+e);f++;}

      // --- pushState with relative URL resolves correctly (no throw) ---
      try{
        history.pushState({},"","?rel=1");
        ok("pushState relative URL no throw", true);
      }catch(e){console.log("FAIL: pushState relative: "+e);f++;}

      // --- pushState with 2 args throws TypeError ---
      try{
        history.pushState({}, "");
        console.log("FAIL: pushState 2-arg should throw");
        f++;
      }catch(e){
        ok("pushState 2-arg throws", true);
      }

      // --- replaceState with 2 args throws TypeError ---
      try{
        history.replaceState({}, "");
        console.log("FAIL: replaceState 2-arg should throw");
        f++;
      }catch(e){
        ok("replaceState 2-arg throws", true);
      }

      console.log(f===0?"ALL PASS":"FAILURES: "+f);
      console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
