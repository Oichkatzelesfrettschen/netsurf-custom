title: Smoke test for HTMLInputElement property implementations
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
    var f=0;
    function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
    var t1=document.createElement("input");
    t1.type="text";
    t1.name="username";
    t1.value="hello";
    document.body.appendChild(t1);
    ok("value=hello", t1.value==="hello");
    t1.value="world";
    ok("value setter", t1.value==="world");
    ok("type=text", t1.type==="text");
    ok("name=username", t1.name==="username");
    var t2=document.createElement("input");
    t2.type="checkbox";
    t2.checked=true;
    t2.disabled=true;
    document.body.appendChild(t2);
    ok("checked=true", t2.checked===true);
    t2.checked=false;
    ok("checked setter", t2.checked===false);
    ok("disabled=true", t2.disabled===true);
    var t3=document.createElement("input");
    t3.readOnly=true;
    document.body.appendChild(t3);
    ok("readOnly=true", t3.readOnly===true);
    console.log(f===0?"ALL PASS":"FAILURES: "+f);
    console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
