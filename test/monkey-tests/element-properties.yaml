title: Smoke test for Element.tagName/localName and HTMLElement.hidden/tabIndex
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
    var f=0;
    function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
    var div=document.createElement("div");
    document.body.appendChild(div);
    var span=document.createElement("span");
    span.hidden=true;
    document.body.appendChild(span);
    ok("tagName=DIV", div.tagName==="DIV");
    ok("localName", div.localName==="DIV"||div.localName==="div");
    ok("hidden=true", span.hidden===true);
    ok("not-hidden=false", div.hidden===false);
    div.hidden=true;
    ok("hidden setter works", div.hidden===true);
    div.hidden=false;
    ok("hidden remove works", div.hidden===false);
    ok("tabIndex is number", typeof div.tabIndex==="number");
    div.tabIndex=10;
    ok("tabIndex setter works", div.tabIndex===10);
    console.log(f===0?"ALL PASS":"FAILURES: "+f);
    console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
