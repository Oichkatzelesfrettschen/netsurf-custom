title: document.forms/images/links, characterSet, readyState
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
      var f=0;
      function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
      ok("forms exists", !!document.forms);
      ok("forms is collection", typeof document.forms.length==="number");
      ok("images exists", !!document.images);
      ok("images is collection", typeof document.images.length==="number");
      ok("links exists", !!document.links);
      ok("links is collection", typeof document.links.length==="number");
      ok("characterSet is UTF-8", document.characterSet==="UTF-8");
      ok("readyState is string", typeof document.readyState==="string");
      console.log(f===0?"ALL PASS":"FAILURES: "+f);
      console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
