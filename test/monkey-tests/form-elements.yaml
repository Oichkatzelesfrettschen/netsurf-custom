title: Smoke test for HTMLButtonElement and HTMLSelectElement properties
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
    var f=0;
    function ok(n,e){if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}
    var btn=document.createElement("button");
    btn.disabled=true;
    btn.name="submit_btn";
    btn.value="go";
    document.body.appendChild(btn);
    ok("btn.disabled=true", btn.disabled===true);
    ok("btn.name", btn.name==="submit_btn");
    ok("btn.value", btn.value==="go");
    btn.disabled=false;
    ok("btn.disabled setter", btn.disabled===false);
    var sel=document.createElement("select");
    sel.name="color";
    document.body.appendChild(sel);
    ok("sel.name", sel.name==="color");
    ok("sel.disabled=false", sel.disabled===false);
    var t=sel.type;
    ok("sel.type", t==="select-one"||t==="select-multiple");
    console.log(f===0?"ALL PASS":"FAILURES: "+f);
    console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
