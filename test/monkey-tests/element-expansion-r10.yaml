title: Element expansion R10 - NS methods, insertAdjacentElement/Text, ChildNode mixin
group: js-api
steps:
- action: launch
  args:
  - "--enable_javascript=1"
- action: window-new
  tag: win1
- action: navigate
  window: win1
  url: about:blank
- action: block
  conditions:
  - window: win1
    status: complete
- action: clear-log
  window: win1
- action: js-exec
  window: win1
  cmd: >-
    (function(){
      var f=0;
      function ok(n,e){try{if(e){console.log("PASS: "+n);}else{console.log("FAIL: "+n);f++;}}catch(x){console.log("ERROR: "+n+": "+x);f++;}}
      var div=document.createElement("div");
      div.id="target";
      document.body.appendChild(div);
      ok("getAttributeNS is function", typeof div.getAttributeNS==="function");
      ok("setAttributeNS is function", typeof div.setAttributeNS==="function");
      ok("removeAttributeNS is function", typeof div.removeAttributeNS==="function");
      ok("hasAttributeNS is function", typeof div.hasAttributeNS==="function");
      ok("getElementsByClassName is function", typeof div.getElementsByClassName==="function");
      ok("getElementsByTagNameNS is function", typeof div.getElementsByTagNameNS==="function");
      ok("insertAdjacentElement is function", typeof div.insertAdjacentElement==="function");
      ok("insertAdjacentText is function", typeof div.insertAdjacentText==="function");
      var span=document.createElement("span");
      span.textContent="inserted";
      try{var result=div.insertAdjacentElement("beforeend", span);ok("insertAdjacentElement works", result!==undefined);}catch(x){console.log("SKIP: insertAdjacentElement: "+x);f++;}
      var p=document.createElement("p");
      document.body.appendChild(p);
      ok("before is function", typeof p.before==="function");
      ok("after is function", typeof p.after==="function");
      ok("nonce getter", typeof div.nonce==="string");
      console.log(f===0?"ALL PASS":"FAILURES: "+f);
      console.log("DONE");
    })()
- action: wait-log
  window: win1
  substring: DONE
- action: quit
